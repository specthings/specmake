name: Python package on FreeBSD
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Cache for UV inside VM
      uses: actions/cache@v5
      with:
        path: .freebsd/uv
        key: freebsd-uv-${{ hashFiles('uv.lock') }}
        restore-keys: |
          freebsd-uv-
    - name: Make
      uses: vmactions/freebsd-vm@v1
      with:
        run: |
          pkg update -f
          pkg install -y python3 py311-maturin py311-numpy py311-lxml py311-pillow py311-sqlite3 uv cmake gmake git rust
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          export MPLBACKEND=Agg
          export UV_CACHE_DIR="$GITHUB_WORKSPACE/.freebsd/uv"
          gmake
