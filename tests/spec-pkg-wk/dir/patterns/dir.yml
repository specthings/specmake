copyrights-by-license: {}
copy-to-buildspace-actions:
- action: copy-and-substitute
  enabled-by: true
  input-name: .
  output-name: .
  source: t.txt
  target: t.txt
destination-directory: ${.:/component/deployment-directory}
directory: ${.:/component/workspace-directory}/dir
enabled-by: true
file-mappings:
- count: 1
  pattern: \bc1/
  replacement: rc1/
- pattern: \bc1/
  replacement: rc1/
- pattern: \bcn/
  replacement: rcn/
- continue: true
  pattern: \ba/
  replacement: b/
- pattern: \bb/
  replacement: c/
- pattern: ^s
  replacement: rs
- pattern: e$
  replacement: re
links:
- hash: null
  name: component
  role: input
  uid: /pkg/component
params:
  k: ${.:/component/deployment-directory}
patterns:
- exclude: []
  include: '**/*'
pkg-type: workspace
type: pkg
workspace-type: directory
