default-timeout-in-seconds: 90.0
description: |
  Run the tests using an agent through gRPC.
do-not-run: []
enabled-by: test-runner-grpc
links:
- role: target
  uid: /target/alpha
max-retry-count-per-executable: 3
min-timeout-in-seconds: 10.0
name: EB Test Runner for target ${.:/target-name}
nm: ${.:/component/deployment-directory}/bin/${.:/component/arch}-rtems${.:/component/rtems-version}-nm
params: {}
pkg-type: test-runner
reset:
- enabled-by: true
  value: bsp_reset
server-address:
- enabled-by: foobar
  value: 'bleifus:50051'
- enabled-by: true
  value: 'iris:50051'
strip: ${.:/component/deployment-directory}/bin/${.:/component/arch}-rtems${.:/component/rtems-version}-strip
target:
- enabled-by:
    not: no-target
  value: the/target
test-runner-type: grpc
timeout-scaler: 2.0
type: pkg
