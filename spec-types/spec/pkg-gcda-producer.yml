          It shall be the working directory to run the commands.
        spec-type: str
    description: |
      This set of attributes specifies how to run the GCDA producer.  The GCDA
      producer supports a placement of the GCDA and GCNO files in a directory
      separate from the build directory.  This allows the separate collection
      and analysis of coverage data provided by different test runners.  For
      some projects, it is required to add symbolic links from the GCDA and
      GCNO directory to the build directory to find source files generated by
      the build system.
    mandatory-attributes: all
