spec-info:
  dict:
    attributes:
      actions:
        description: |
          It shall be the list of actions to run.
        spec-type: pkg-action-list
      copyrights-by-license:
        description: null
        spec-type: pkg-copyrights-by-license
      directory:
        description: |
          It shall be the path to the directory.  A variable substitution is
          performed on the value.  For example, you can use
          ``$${/variant:/build-directory}/some/path/in/build/directory`` or
          ``$${/variant:/deployment-directory}/some/path/in/deployment/directory``.
        spec-type: str
      directory-state-type:
        description: |
          It shall be the directory state type.
        spec-type: name
      files:
        description: null
        spec-type: pkg-file-state-list
      hash:
        description: |
          If the value is present, then it shall be the hash of the file state
          list and the directory path, otherwise the directory state is
          invalid.
        spec-type: optional-sha512
      params:
        description: |
          It shall be an optional set of parameters which may be used for
          variable substitution.
        spec-type: any
      post-actions:
        description: |
          It shall be the list of actions to run after the main work.
        spec-type: pkg-action-list
    description: |
      This set of attributes specifies a directory state.
    mandatory-attributes:
    - copyrights-by-license
    - directory
    - directory-state-type
    - files
    - hash
spec-name: Directory State Item Type
spec-type: pkg-directory-state
type: spec
