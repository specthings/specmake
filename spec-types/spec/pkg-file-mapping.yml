spec-info:
  dict:
    attributes:
      continue:
        description: |
          It shall be true, to continue with the file mapping process after at
          least one replacement for the pattern, otherwise false.
        spec-type: bool
      count:
        description: |
          It shall be the maximum replacement count.  If the value is zero, all
          occurrences will be replaced.
        spec-type: int
      pattern:
        description: |
          It shall be the Python regular expression pattern to replace.
        spec-type: str
      replacement:
        description: |
          It shall be the replacement.
        spec-type: str
    description: |
      This set of attributes specifies a file mapping.
    mandatory-attributes:
    - pattern
    - replacement
spec-name: File Mapping
spec-type: pkg-file-mapping
type: spec
