spec-info:
  dict:
    attributes:
      copy-to-buildspace-actions:
        description: |
          It shall be the list of actions to run when the state is copied to
          the buildspace.
        spec-type: pkg-action-list
      copyrights-by-license:
        description: null
        spec-type: pkg-copyrights-by-license
      destination-directory:
        description: |
          It shall be the destination directory.
        spec-type: str
      directory:
        description: |
          It shall be the source directory in the workspace.
        spec-type: str
      directory-state-type:
        description: |
          It shall be the directory state type in the buildspace.
        spec-type: str
      directory-state-load-before-use:
        description: |
          It shall be true, to load the directory state from the filesystem
          before it is used during the package build, otherwise false.  By
          default, directory states are loaded on demand when the package build
          changed files associated with the directory state.  The default
          behaviour is a performance optimization.  Carefully consider the
          implications before you enable this option for a directory state.
        spec-type: bool
      file-mappings:
        description: null
        spec-type: pkg-file-mapping-list
      files:
        description: null
        spec-type: pkg-file-state-list
      params:
        description: |
          It shall be an optional set of parameters which may be used for
          variable substitution.
        spec-type: any
      patterns:
        description: null
        spec-type: pkg-directory-state-pattern-list
    description: |
      This set of attributes specifies a workspace directory.
    mandatory-attributes:
    - copyrights-by-license
    - destination-directory
    - directory
spec-name: Workspace Directory Item Type
spec-type: pkg-workspace-directory
type: spec
