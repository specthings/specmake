spec-info:
  dict:
    attributes: {}
    description: |
      It defines the package template role of links.  The
      ``add-package-template`` and ``add-package-component-template`` roles are
      intended for parent links to register the package template at the parent
      so that the parent can use the package template through a child link.  The
      ``use-package-template`` and ``use-package-component-template`` roles are
      intended for parent links to directly use the referenced package template.
    mandatory-attributes: all
spec-name: Package Template Link Role
spec-type: pkg-template-role
