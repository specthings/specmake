enabled-by: true
links:
- role: spec-member
  uid: root
spec-description: |
  A value of this type shall be an expression which defines under which
  conditions the specification item or parts of it are enabled.  The expression
  is evaluated with the use of an *enabled set*.  This is a set of strings
  which indicate enabled features.
spec-example: null
spec-info:
  bool:
    description: |
      This expression evaluates directly to the boolean value.
  dict:
    attributes:
      and:
        description: |
          The *and* operator evaluates to the *logical and* of the evaluation
          results of the expressions in the list.
        spec-type: pkg-action-enabled-by-list
      is-empty:
        description: |
          The expression of the *is-empty* operation shall be a list of
          integers or strings.  If the list is empty, then the expression
          evaluates to true, otherwise to false.
        spec-type: list-int-or-str
      eq:
        description: |
          The expression of the *eq* operation shall be a list of integers or
          strings.  If all elements are equal, then the expression evaluates to
          true, otherwise to false.  The empty list evaluates to true.
        spec-type: list-int-or-str
      ge:
        description: |
          The expression of the *ge* operation shall be a list of integers or
          strings.  If each element converted to an integer is greater than or
          equal to its successor, then the expression evaluates to true,
          otherwise to false.  The empty list evaluates to true.
        spec-type: list-int-or-str
      gt:
        description: |
          The expression of the *gt* operation shall be a list of integers or
          strings.  If each element converted to an integer is greater than its
          successor, then the expression evaluates to true, otherwise to false.
          The empty list evaluates to true.
        spec-type: list-int-or-str
      has-output:
        description: |
          The expression of the *has-output* operation shall be the name of an
          output.  If an output of this name exists, then the expression
          evaluates to true, otherwise to false.
        spec-type: str
      le:
        description: |
          The expression of the *le* operation shall be a list of integers or
          strings.  If each element converted to an integer is less than or
          equal to its successor, then the expression evaluates to true,
          otherwise to false.  The empty list evaluates to true.
        spec-type: list-int-or-str
      lt:
        description: |
          The expression of the *lt* operation shall be a list of integers or
          strings.  If each element converted to an integer is less than its
          successor, then the expression evaluates to true, otherwise to false.
          The empty list evaluates to true.
        spec-type: list-int-or-str
      not:
        description: |
          The *not* operator evaluates to the *logical not* of the evaluation
          results of the expression.
        spec-type: pkg-action-enabled-by
      or:
        description: |
          The *or* operator evaluates to the *logical or* of the evaluation
          results of the expressions in the list.
        spec-type: pkg-action-enabled-by-list
    description: |
      Each attribute defines an operator.
    mandatory-attributes: exactly-one
  list:
    description: |
      This list of expressions evaluates to the *logical or* of the evaluation
      results of the expressions in the list.
    spec-type: pkg-action-enabled-by
  str:
    description: |
      If the value is in the *enabled set*, this expression evaluates to true,
      otherwise to false.
spec-name: Action Enabled-By Expression
spec-type: pkg-action-enabled-by
type: spec
