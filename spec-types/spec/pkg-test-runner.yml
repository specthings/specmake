spec-info:
  dict:
    attributes:
      default-timeout-in-seconds:
        description: |
          It shall be the default timeout in seconds.
        spec-type: float
      description:
        description: |
          It shall be the test runner description.
        spec-type: str
      do-not-run:
        description: |
          It shall be the list of test executable names which should not be
          run.
        spec-type: list-str
      max-retry-count-per-executable:
        description: |
          It shall be the maximum count of retries per executable.  With a
          value of zero exactly one run per executable is performed.  An
          executable run is retried if no report was produced, the gcov
          information was corrupt, or the test suite report was corrupt.
        spec-type: int
      min-timeout-in-seconds:
        description: |
          It shall be the minimum timeout in seconds.
        spec-type: float
      name:
        description: |
          It shall be the test runner name.
        spec-type: str
      params:
        description: |
          It shall be an optional set of parameters which may be used for
          variable substitution.
        spec-type: any
      test-runner-type:
        description: |
          It shall be the test runner type.
        spec-type: name
      timeout-scaler:
        description: |
          It shall be the timeout scaling factor.
        spec-type: float
    description: |
      This set of attributes specifies a test runner.  Let *E* be the
      test-specific timeout or the default timeout associated with a test
      executable.  Let *M* be the maximum of *E* and the specified minimum
      timeout.  Let *S* be *M* multiplied by the specified timeout scaler.  The
      value *S* is passed to the test runner as the recommended timeout in
      seconds for each test executable.
    mandatory-attributes: all
spec-name: Test Runner Item Type
spec-type: pkg-test-runner
type: spec
