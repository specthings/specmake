  dict:
    attributes:
      enabled-by:
        description: |
          It shall define the conditions under which the discard pattern is
          enabled.  The executable file name is the enabled set.
        spec-type: enabled-by
      pattern:
        description: |
          It shall define the regular expression to determine if a test result
          may get discarded.  If the test output matches with the pattern, then
          the test may get executed again.
        spec-type: str
    description: |
      This set of attributes specifies a discard pattern and the conditions
      under which it is enabled.
