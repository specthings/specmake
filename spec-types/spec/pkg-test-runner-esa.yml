  uid: pkg-test-runner
spec-description: null
spec-example: null
spec-info:
  dict:
    attributes:
      bsp-to-target-board:
        description: |
          It shall be the BSP name to target board mapping.
        spec-type: str-to-str
      delete-remote-branch:
        description: |
          It shall be true, to delete the remote branch once the request
          handling finished, otherwise the remote branch is not deleted.
        spec-type: bool
      git-fetch-polling-interval-in-seconds:
        description: |
          It shall be the Git fetch polling interval in seconds.  The polling
          interval determines how often a Git fetch from the remote repository
          is carried out.
        spec-type: int
      max-overall-timeout-in-seconds:
        description: |
          It shall be the maximum for the sum of all executable timeout values
          of a request in seconds.  The test runner splits up its work into
          multiple requests to the ESA test run repository.  While the timeout
          of an individual executable exceeds the value, a request with exactly
          this executable will be sent.
        spec-type: int
      max-request-delay-in-seconds:
        description: |
          It shall be the maximum request delay in seconds which is tolerated.
          A request delay may occur if multiple agents access the boards in
          parallel.
        spec-type: int
      request-policy:
        description: |
          It shall be the request policy.
        spec-type: pkg-test-runner-esa-policy
      strip-program-path:
        description: |
          It shall be the path to the strip program.
        spec-type: str
    description: |
      This set of attributes specifies an ESA test runner.
    mandatory-attributes: all
spec-name: ESA Test Runner Item Type
spec-type: pkg-test-runner-esa
type: spec
